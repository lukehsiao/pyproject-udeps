name: Binaries

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v0.3.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v0.3.0)"
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: false
            ext: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            ext: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            ext: tar.gz
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use-cross: true
            ext: tar.gz
          - target: armv7-unknown-linux-musleabihf
            runner: ubuntu-latest
            use-cross: true
            ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use-cross: false
            ext: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            use-cross: false
            ext: zip

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Create archive (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          tar czf pyproject-udeps-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release pyproject-udeps

      - name: Create archive (zip, Windows)
        if: matrix.ext == 'zip' && runner.os == 'Windows'
        shell: bash
        run: |
          7z a pyproject-udeps-${{ matrix.target }}.zip \
            ./target/${{ matrix.target }}/release/pyproject-udeps.exe

      - name: Generate checksums
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shasum -a 256 pyproject-udeps-${{ matrix.target }}.${{ matrix.ext }} > pyproject-udeps-${{ matrix.target }}.${{ matrix.ext }}.sha256
          else
            sha256sum pyproject-udeps-${{ matrix.target }}.${{ matrix.ext }} > pyproject-udeps-${{ matrix.target }}.${{ matrix.ext }}.sha256
          fi

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release upload "$TAG" \
            pyproject-udeps-${{ matrix.target }}.${{ matrix.ext }} \
            pyproject-udeps-${{ matrix.target }}.${{ matrix.ext }}.sha256 \
            --clobber
